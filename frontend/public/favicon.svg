<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Open book icon for Rare Books -->
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f5e6b8"/>
    </linearGradient>
  </defs>
  <!-- Left cover -->
  <path d="M3 6c0-1 .8-2 2-2.2C8 3.2 13 3 16 5v21c-3-1.8-7.5-2-11-1.5-1.2.2-2-.5-2-1.5V6z" fill="url(#cover)"/>
  <!-- Right cover -->
  <path d="M29 6c0-1-.8-2-2-2.2C24 3.2 19 3 16 5v21c3-1.8 7.5-2 11-1.5 1.2.2 2-.5 2-1.5V6z" fill="url(#cover)"/>
  <!-- Left pages -->
  <path d="M5 7c0-.5.5-1.2 1.2-1.3C9 5.2 13 5 16 6.5v18c-3-1.2-6.5-1.5-9.5-1-.8.1-1.5-.3-1.5-1V7z" fill="url(#pages)"/>
  <!-- Right pages -->
  <path d="M27 7c0-.5-.5-1.2-1.2-1.3C23 5.2 19 5 16 6.5v18c3-1.2 6.5-1.5 9.5-1 .8.1 1.5-.3 1.5-1V7z" fill="url(#pages)"/>
  <!-- Spine line -->
  <line x1="16" y1="5" x2="16" y2="24.5" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
  <!-- Page lines left -->
  <line x1="7" y1="9" x2="14" y2="10" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <line x1="7" y1="12" x2="14" y2="13" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <line x1="7" y1="15" x2="14" y2="16" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <line x1="7" y1="18" x2="14" y2="19" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <!-- Page lines right -->
  <line x1="18" y1="10" x2="25" y2="9" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="13" x2="25" y2="12" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="16" x2="25" y2="15" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="19" x2="25" y2="18" stroke="#c4a97d" stroke-width="0.5" opacity="0.4"/>
  <!-- Small star/sparkle for "discovery" feel -->
  <circle cx="24" cy="4" r="1" fill="#f59e0b" opacity="0.8"/>
  <circle cx="26" cy="6" r="0.6" fill="#f59e0b" opacity="0.5"/>
</svg>
